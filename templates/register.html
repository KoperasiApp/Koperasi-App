<!DOCTYPE html>
<html>
<head>
<title>Register Koperasi</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:35px;
border-radius:18px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
text-align:center;
}

h2{
margin-bottom:20px;
color:#0f172a;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

input:focus,select:focus{
border-color:#2563eb;
box-shadow:0 0 6px #2563eb55;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

a{
display:block;
margin-top:12px;
font-size:13px;
color:#2563eb;
text-decoration:none;
}

.small{
font-size:12px;
color:#666;
margin-top:5px;
}
</style>

</head>

<body>

<div class="card">
<h2>Daftar Akun</h2>

<p class="small">Buat akun untuk masuk ke KoperasiApp</p>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<select name="role">
    <option value="kasir">Kasir</option>
    <option value="admin">Admin</option>
</select>

<button>Daftar</button>

</form>

<a href="/login">Sudah punya akun? Login</a>
</div>

</body>
</html>
