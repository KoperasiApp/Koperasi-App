<!DOCTYPE html>
<html>
<head>
<title>Login Koperasi</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:35px;
border-radius:18px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
text-align:center;
}

h2{
margin-bottom:20px;
color:#0f172a;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 6px #2563eb55;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

a{
display:block;
margin-top:12px;
font-size:13px;
color:#2563eb;
text-decoration:none;
}

.small{
font-size:12px;
color:#666;
margin-top:5px;
}

.error{
background:#fee2e2;
color:#b91c1c;
padding:12px;
border-radius:10px;
margin-bottom:12px;
font-size:14px;
}
</style>

</head>

<body>

<div class="card">

<h2>Login Koperasi</h2>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<p class="small">Masuk ke sistem KoperasiApp</p>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button>Login</button>

</form>

<a href="/register">Belum punya akun? Daftar</a>

</div>

</body>
</html>
