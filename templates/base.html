<!DOCTYPE html>
<html>
<head>
<title>KoperasiApp</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:210px;
height:100vh;
background:#0f172a;
padding:20px;
position:fixed;
left:0;
top:0;
border-right:1px solid #1e293b;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{
display:block;
padding:12px;
margin:8px 0;
border-radius:10px;
text-decoration:none;
color:#cbd5e1;
background:#111827;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
transform:translateX(5px);
}

/* CONTENT FIX (INI PENTING BIAR TIDAK KELEBIHAN KIRI) */
.content{
margin-left:260px;
padding:25px;
width:calc(100% - 260px);
box-sizing:border-box;
}

/* CARD */
.card{
background:#111827;
padding:18px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#0b1220;
color:white;
outline:none;
}

/* BUTTON */
button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:#3b82f6;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #1f2937;
text-align:center;
}

th{
color:#38bdf8;
}

/* STOK WARNING */
.low{
color:#ef4444;
font-weight:bold;
}

/* KASIR LAYOUT 2 KOLOM */
.kasir-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

@media(max-width:900px){
.kasir-grid{
grid-template-columns:1fr;
}
.content{
margin-left:0;
width:100%;
}
.sidebar{
position:relative;
width:100%;
height:auto;
}
}
</style>

</head>

<body>

<div class="sidebar">
<h2>🏪 KoperasiApp</h2>
<a href="/">📊 Dashboard</a>
<a href="/kasir">🧾 Kasir</a>
</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
